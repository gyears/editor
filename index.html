<!DOCTYPE html>
<html lang="zh-TW" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流金編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3045;--gold:#f0b429;--gold2:#ffd166;--text:#e8eaf0;--text2:#8b92a8;--red:#ef4444;--blue:#3b82f6;--green:#22c55e;--radius:10px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;height:100vh;display:flex;flex-direction:column;font-size:14px;overflow:hidden}header{background:linear-gradient(135deg,#181c27,#1a1f30);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;z-index:100;flex-wrap:wrap;flex-shrink:0}.logo{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.5px}.subtitle{font-size:11px;color:var(--text2)}.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}.hint-badge{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px}.hint-badge b{color:var(--gold)}.main{display:grid;grid-template-columns:240px 1fr 1fr;flex:1;min-height:0;overflow:hidden}.panel-left{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}.panel-left::-webkit-scrollbar{width:3px}.panel-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.section-group{border-bottom:1px solid var(--border)}.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;user-select:none;transition:background .15s}.section-header:hover{background:var(--surface2)}.section-header .sec-title{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text2);text-transform:uppercase}.section-header .sec-arrow{font-size:10px;color:var(--text2);transition:transform .2s}.section-header.collapsed .sec-arrow{transform:rotate(-90deg)}.section-body{overflow:hidden}.section-body.hidden{display:none}.tag-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;background:none;border:none;cursor:pointer;color:var(--text);font-family:inherit;font-size:12px;text-align:left;transition:background .15s;border-left:2px solid transparent}.tag-btn:hover{background:var(--surface2);border-left-color:var(--gold)}.tag-btn .icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}.tag-btn .label{flex:1}.tag-btn .code{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);background:var(--bg);padding:1px 5px;border-radius:3px;flex-shrink:0}.tag-btn .wrap-hint{display:none;font-size:8px;color:var(--gold);flex-shrink:0}body.has-selection .tag-btn.wrappable .wrap-hint{display:block}body.has-selection .tag-btn.wrappable{border-left-color:rgba(240,180,41,.35)}body.has-selection .tag-btn.wrappable:hover{border-left-color:var(--gold);background:rgba(240,180,41,.06)}.panel-mid{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;height:100%}.panel-header{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;flex-wrap:wrap}.panel-header h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}.format-toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:6px 10px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}.fmt-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}.fmt-btn:hover{background:var(--surface2);border-color:var(--gold);color:var(--gold)}.fmt-btn b{font-weight:700}.fmt-btn i{font-style:italic}.fmt-btn u{text-decoration:underline}.fmt-sep{width:1px;background:var(--border);margin:0 2px;align-self:stretch}#selectionBar{display:none;padding:5px 14px;background:rgba(240,180,41,.1);border-bottom:1px solid rgba(240,180,41,.25);font-size:11px;color:var(--gold);flex-shrink:0}# ve;cursor:pointer;border:2px solid transparent;border-radius:6px;overflow:hidden;aspect-ratio:1}.gallery-item:hover{border-color:var(--gold)}.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}.gallery-item .gal-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer;display:none}.gallery-item:hover .gal-del{display:block}.gallery-empty{color:var(--text2);font-size:12px;text-align:center;padding:20px;grid-column:1/-1}.color-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}.color-swatch{width:22px;height:22px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:transform .15s}.color-swatch:hover,.color-swatch.active{transform:scale(1.2);border-color:#fff}.color-custom{width:32px;height:28px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;padding:2px}.toast{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}#preview .xgold-box{border-left:4px solid #c8a000;background:#fffbe6;padding:8px 14px;margin:8px 0;font-weight:600;color:#5a4500}#preview .xcenter-box{text-align:center;font-weight:700;color:#b8860b;font-size:15px;padding:10px 0}#preview .xgban-box{background:linear-gradient(90deg,#ffe066,#ffd000);text-align:center;font-weight:700;color:#5a3e00;padding:14px;border-radius:4px;font-size:16px;margin:8px 0}#preview .xhr-line{border:none;border-top:2px solid #c8a000;margin:12px 0;opacity:.6}#preview .xnote-box{border-left:4px solid #e6b800;background:#fffde7;padding:8px 14px;margin:8px 0;color:#5c4a00;font-size:13px}#preview .xwarn-box{border-left:4px solid #f87171;background:#fff1f1;padding:8px 14px;margin:8px 0;color:#b91c1c;font-size:13px;border-radius:0 4 border-radius:4px;padding:10px 14px;margin:8px 0;color:#888;font-size:12px;text-align:center}#preview .dialog-container{margin:8px 0}#preview .xleft-bubble{display:flex;justify-content:flex-start;margin:4px 0}#preview .xleft-bubble span{background:#f0f0f0;border-radius:0 12px 12px 12px;padding:8px 14px;max-width:70%;font-size:13px;color:#333}#preview .xright-bubble{display:flex;justify-content:flex-end;margin:4px 0}#preview .xright-bubble span{background:#dcf8c6;border-radius:12px 0 12px 12px;padding:8px 14px;max-width:70%;font-size:13px;color:#333}#preview .xtable{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}#preview .xtable th{background:#f5f5f0;border:1px solid #ddd;padding:8px 12px;text-align:left;font-weight:700;color:#333}#preview .xtable td{border:1px solid #ddd;padding:7px 12px;color:#555}#preview .xtable tr:nth-child(even) td{background:#fafafa}#preview .media-ph{background:#f0f0f0;border:1px solid #ddd;border-radius:6px;padding:10px 14px;margin:6px 0;font-size:12px;color:#888;text-align:center}#preview img.forum-img{max-width:100%;border-radius:4px;margin:4px 0;display:block}#preview .yt-embed{width:100%;aspect-ratio:16/9;border-radius:6px;border:none;margin:6px 0}@media (max-width:768px){body{height:auto;overflow:auto}header{padding:8px 12px;gap:8px}.logo{font-size:15px}.hint-badge{display:none}.header-actions{gap:4px;flex-wrap:wrap}.btn{padding:4px 9px;font-size:11px}.main{display:flex;flex-direction:column;height:auto;overflow:visible}.panel-left{border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row;max-height:none;padding:6px 4px;gap:0}.section-group{display:flex;flex-direction:row;align-items:center;border-bottom:none;border-right:1px solid var(--border);flex-shrink:0}.section-header{padding:4px 8px;border-bottom:none}.section-header .sec-arrow{display:none}.section-header .sec-title{font-size:9px;writing-mode:vertical-rl;text-orientation:mixed;padding:2px 0;letter- <body>

<header>
  <div class="logo">✦ 流金編輯器</div>

  <div class="header-actions">
    <div class="hint-badge" data-i18n="selHint">💡 <b>選取文字</b>後按功能鍵可包裹標籤</div>
    <button class="btn btn-ghost" onclick="toggleLang()" id="langBtn">🌐 EN</button>
    <button class="btn btn-ghost" onclick="saveFile()" title="另存新檔">💾 <span data-i18n="save">另存新檔</span></button>
    <button class="btn btn-gold" onclick="copyCode()">📋 <span data-i18n="copyAll">複製全部</span></button>
  </div>
</header>

<div class="main">
<!-- ═══ LEFT PANEL ═══ -->
<div class="panel-left" id="leftPanel"></div>

<!-- ═══ MIDDLE PANEL ═══ -->
<div class="panel-mid">
  <div class="panel-header">
    <h3 data-i18n="editor">✏️ 編輯器</h3>
    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-ghost" id="splitMergeBtn" onclick="toggleSplitMerge()" title="分欄/合併預覽欄">合併</button>
      <button class="btn btn-ghost" id="previewToggleBtn" onclick="showMergedPreview()" title="預覽文章效果" style="display:none;">預覽</button>
      <button class="btn btn-ghost" onclick="stripBBCode()" title="移除所有BBCode，只保留文字">清除語法</button>
      <button class="btn btn-ghost" onclick="clearEditor()" data-i18n="clear">清空</button>
    </div>
  </div>

  <!-- 格式工具列 -->
  <div class="format-toolbar">
    <button class="fmt-btn" onclick="undoAction()" title="復原 Ctrl+Z">↩</button>
    <button class="fmt-btn" onclick="redoAction()" title="取消復原 Ctrl+Y">↪</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="wrapFmt('b')" title="粗體"><b>B</b></button>
    <button class="fmt-btn" onclick="wrapFmt('i')" title="斜體"><i>I</i></button>
    <button class="fmt-btn" onclick="wrapFmt('u')" title="底線"><u>U</u></button>
    <button class="fmt-btn" onclick="wrapFmt('strike')" title="刪除線"><s>S</s></button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="openSizeModal()" title="文字大小">A↕</button>
    <button class="fmt-btn" onclick="openColorModal('color')" title="字體顏色">A<span style="color:#f0b429;">■</span></button>
    <button class="fmt-btn" onclick="openColorModal('backcolor')" title="背景顏色">A<span style="background:#f0b429;color:#000;padding:0 2px;">bg</span></button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="wrapFmt('align','left')" title="左對齊">⬅</button>
    <button class="fmt-btn" onclick="wrapFmt('align','center')" title="置中">≡</button>
    <button class="fmt-btn" onclick="wrapFmt('align','right')" title="右對齊">➡</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="insertAtCursor('[hr]\n')" title="分隔線（細灰色）">分隔線</button>
    <button class="fmt-btn" onclick="wrapFmt('code')" title="程式碼（原樣顯示）">&lt;/&gt;</button>
    <button class="fmt-btn" onclick="wrapFmt('url')" title="超連結">🔗</button>
  </div>

  <div id="selectionBar">✨ <span data-i18n="selActive">已選取文字 — 點選功能鍵可包裹</span></div>
  <textarea id="editor"
    placeholder="點功能按鈕插入 BBCode，或直接輸入..."
    oninput="onEditorInput()"
    onmouseup="checkSel()"
    onkeyup="checkSel()"
    onkeydown="handleKeyDown(event)"
  ></textarea>
  <div class="editor-footer">
    <div class="footer-stats">
      <span id="charCount">0 字元</span>
      <span id="zhCount">中文：0 字</span>
    </div>
    <button class="btn btn-ghost" style="font-size:10px;" onclick="updatePreview()">🔄 <span data-i18n="refresh">重新預覽</span></button>
  </div>
</div>

<!-- ═══ RIGHT PANEL ═══ -->
<div class="panel-right">
  <div class="panel-header">
    <h3 data-i18n="preview">👁 論壇預覽</h3>
  </div>
  <div id="preview"><p style="color:#aaa;font-size:13px;text-align:center;margin-top:50px;" data-i18n="previewHint">← 從左側選擇標籤開始</p></div>
</div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <h4 id="modalTitle"></h4>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions">
      <button class="btn btn-ghost" onclick="closeModal()"><span data-i18n="cancel">取消</span></button>
      <button class="btn btn-gold" id="modalOK" onclick="confirmInsert()"><span data-i18n="insert">插入</span></button>
    </div>
  </div>
