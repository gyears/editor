<!DOCTYPE html>
<html lang="zh-TW" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流金編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3045;
  --gold:#f0b429;--gold2:#ffd166;--text:#e8eaf0;--text2:#8b92a8;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;height:100vh;display:flex;flex-direction:column;font-size:14px;overflow:hidden;}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#181c27,#1a1f30);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;z-index:100;flex-wrap:wrap;flex-shrink:0;}
.logo{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.5px;}
.subtitle{font-size:11px;color:var(--text2);}
.header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hint-badge{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;}
.hint-badge b{color:var(--gold);}

/* ── MAIN LAYOUT ── */
.main{display:grid;grid-template-columns:240px 1fr 1fr;flex:1;min-height:0;overflow:hidden;}

/* ── LEFT PANEL ── */
.panel-left{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.panel-left::-webkit-scrollbar{width:3px;}
.panel-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.section-group{border-bottom:1px solid var(--border);}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.section-header:hover{background:var(--surface2);}
.section-header .sec-title{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--text2);text-transform:uppercase;}
.section-header .sec-arrow{font-size:10px;color:var(--text2);transition:transform .2s;}
.section-header.collapsed .sec-arrow{transform:rotate(-90deg);}
.section-body{overflow:hidden;}
.section-body.hidden{display:none;}

.tag-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;background:none;border:none;cursor:pointer;color:var(--text);font-family:inherit;font-size:12px;text-align:left;transition:background .15s;border-left:2px solid transparent;}
.tag-btn:hover{background:var(--surface2);border-left-color:var(--gold);}
.tag-btn .icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.tag-btn .label{flex:1;}
.tag-btn .code{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);background:var(--bg);padding:1px 5px;border-radius:3px;flex-shrink:0;}
.tag-btn .wrap-hint{display:none;font-size:8px;color:var(--gold);flex-shrink:0;}
body.has-selection .tag-btn.wrappable .wrap-hint{display:block;}
body.has-selection .tag-btn.wrappable{border-left-color:rgba(240,180,41,.35);}
body.has-selection .tag-btn.wrappable:hover{border-left-color:var(--gold);background:rgba(240,180,41,.06);}

/* ── MIDDLE PANEL ── */
.panel-mid{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;height:100%;}
.panel-header{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.panel-header h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}

/* 格式工具列 */
.format-toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:6px 10px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.fmt-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.fmt-btn:hover{background:var(--surface2);border-color:var(--gold);color:var(--gold);}
.fmt-btn b{font-weight:700;}
.fmt-btn i{font-style:italic;}
.fmt-btn u{text-decoration:underline;}
.fmt-sep{width:1px;background:var(--border);margin:0 2px;align-self:stretch;}

#selectionBar{display:none;padding:5px 14px;background:rgba(240,180,41,.1);border-bottom:1px solid rgba(240,180,41,.25);font-size:11px;color:var(--gold);flex-shrink:0;}
#selectionBar.visible{display:flex;align-items:center;gap:6px;}

textarea#editor{flex:1;background:var(--bg);border:none;outline:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;padding:14px;resize:none;caret-color:var(--gold);overflow-y:auto;min-height:0;}
textarea#editor::selection{background:rgba(240,180,41,.2);}

.editor-footer{padding:6px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;flex-wrap:wrap;gap:4px;}
.footer-stats{font-size:11px;color:var(--text2);display:flex;gap:12px;}

/* ── RIGHT PANEL ── */
.panel-right{display:flex;flex-direction:column;overflow:hidden;background:#fff;}
.panel-right .panel-header{background:#f5f5f0;border-bottom:1px solid #ddd;}
.panel-right .panel-header h3{color:#666;}
#preview{flex:1;overflow-y:auto;padding:18px 22px;font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.8;color:#333;background:#fff;}

/* ── BUTTONS ── */
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all .15s;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--text2);}
.btn-blue{background:#1d4ed8;color:#fff;}
.btn-blue:hover{background:#2563eb;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:460px;max-width:92vw;max-height:90vh;overflow-y:auto;}
.modal h4{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--gold);}
.modal label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;margin-top:10px;}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 11px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border .15s;}
.modal input:focus,.modal textarea:focus{border-color:var(--gold);}
.modal textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* table builder */
.tbl-builder{margin-top:8px;}
.tbl-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;}
.tbl-row input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;}
.tbl-row input:focus{border-color:var(--gold);}
.tbl-del-btn{background:none;border:1px solid #444;border-radius:5px;color:#888;cursor:pointer;padding:4px 8px;font-size:12px;}
.tbl-del-btn:hover{color:var(--red);border-color:var(--red);}
.tbl-add-btn{background:none;border:1px dashed var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:5px;width:100%;font-size:12px;font-family:inherit;transition:all .15s;}
.tbl-add-btn:hover{border-color:var(--gold);color:var(--gold);}

/* postimages steps */
.postimg-steps{}
.postimg-step{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.postimg-step:last-child{border-bottom:none;}
.step-num{width:20px;height:20px;background:var(--gold);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.step-body{flex:1;}
.step-title{font-size:12px;font-weight:600;margin-bottom:3px;}
.step-desc{font-size:11px;color:var(--text2);line-height:1.5;}
.postimg-open-btn{display:inline-block;margin-top:5px;background:var(--gold);color:#000;border:none;border-radius:5px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.postimg-open-btn:hover{background:var(--gold2);}

/* gallery */
.gallery-grid{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.gallery-item{position:relative;cursor:pointer;border:2px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg);display:flex;align-items:flex-start;transition:border-color .15s;}
.gallery-item:hover{border-color:var(--gold);}
.gallery-item .gal-thumb{flex-shrink:0;width:90px;height:90px;object-fit:cover;display:block;background:#111;}
.gallery-item canvas.gal-thumb{width:90px;height:90px;display:block;background:#1a1a1a;}
.gallery-item .gal-thumb-placeholder{flex-shrink:0;width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:32px;background:#1a1a1a;}
.gallery-item .gal-info{flex:1;padding:8px 10px;min-width:0;display:flex;flex-direction:column;gap:3px;}
.gallery-item .gal-info .gal-type{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);}
.gallery-item .gal-info .gal-url{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text);word-break:break-all;line-height:1.4;opacity:.8;}
.gallery-item .gal-info .gal-hint{font-size:10px;color:var(--gold);margin-top:auto;}
.gallery-item .gal-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;line-height:1.4;}
.gallery-item:hover .gal-del{opacity:1;}
.gallery-empty{color:var(--text2);font-size:12px;text-align:center;padding:24px 10px;line-height:1.6;}
/* color picker row */
.color-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;}
.color-swatch{width:22px;height:22px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:transform .15s;}
.color-swatch:hover,.color-swatch.active{transform:scale(1.2);border-color:#fff;}
.color-custom{width:32px;height:28px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;padding:2px;}

/* ── TOAST ── */
textarea#editor.dragging{
  border:2px dashed var(--gold)!important;
  background:rgba(240,180,41,0.05)!important;
  border-color:#c8a96b!important;
  background:#1a1a0f!important;
  box-shadow:0 0 0 3px rgba(200,169,107,.2);
}
.toast{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* ── FORUM PREVIEW STYLES ── */
#preview .xgold-box{border-left:4px solid #c8a000;background:#fffbe6;padding:8px 14px;margin:8px 0;font-weight:600;color:#5a4500;}
#preview .xcenter-box{text-align:center;font-weight:700;color:#b8860b;font-size:15px;padding:10px 0;}
#preview .xgban-box{background:linear-gradient(90deg,#ffe066,#ffd000);text-align:center;font-weight:700;color:#5a3e00;padding:14px;border-radius:4px;font-size:16px;margin:8px 0;}
#preview .xhr-line{border:none;border-top:2px solid #c8a000;margin:12px 0;opacity:.6;}
#preview .xnote-box{border-left:4px solid #e6b800;background:#fffde7;padding:8px 14px;margin:8px 0;color:#5c4a00;font-size:13px;}
#preview .xwarn-box{border-left:4px solid #f87171;background:#fff1f1;padding:8px 14px;margin:8px 0;color:#b91c1c;font-size:13px;border-radius:0 4px 4px 0;}
#preview .xblue-box{border-left:4px solid #3b82f6;background:#eff6ff;padding:8px 14px;margin:8px 0;color:#1d4ed8;font-size:13px;font-weight:700;}
#preview .xgreen-box{border-left:4px solid #22c55e;background:#f0fdf4;padding:8px 14px;margin:8px 0;color:#15803d;font-size:13px;font-weight:700;}
#preview .xred-box{border-left:4px solid #ef4444;background:#fff5f5;padding:8px 14px;margin:8px 0;color:#dc2626;font-size:13px;font-weight:700;}
#preview .xinfo-box{border-left:4px solid #93c5fd;background:#eff6ff;padding:8px 14px;margin:8px 0;color:#1d4ed8;font-size:13px;border-radius:0 4px 4px 0;}
#preview .xglass-box{background:rgba(200,200,210,.12);border:1px solid rgba(200,200,210,.4);padding:10px 16px;border-radius:8px;margin:8px 0;color:#444;font-size:13px;}
#preview .xsmall-text{font-size:11px;color:#888;line-height:1.5;}
#preview .xspoiler-wrap{margin:6px 0;}
#preview .xcard-box{border:1px solid #ddd;border-radius:8px;overflow:hidden;margin:8px 0;}
#preview .xcard-title{background:#f5f5f5;padding:8px 14px;font-weight:700;font-size:13px;border-bottom:1px solid #ddd;color:#333;}
#preview .xcard-body{padding:10px 14px;font-size:13px;color:#555;}
#preview .xtag-pill{display:inline-block;background:#e8f0fe;color:#1a56db;border:1px solid #c7d7fc;border-radius:20px;padding:2px 10px;font-size:12px;margin:2px;}
#preview .xrate-badge{display:inline-flex;align-items:center;gap:4px;background:#fff9e6;border:1px solid #f0d060;border-radius:20px;padding:3px 10px;font-size:12px;color:#8a6000;font-weight:600;}
#preview .xbtn-link{display:inline-block;background:#f0f0f0;border:1px solid #ccc;border-radius:6px;padding:5px 14px;font-size:13px;color:#333;text-decoration:none;margin:4px 0;}
#preview .quote-box{border:1px solid #ddd;border-radius:4px;background:#f9f9f9;padding:10px 14px;margin:8px 0;color:#555;font-size:13px;}
#preview .xquote-box{border-left:3px solid #ccc;padding:4px 14px;margin:8px 0;color:#666;font-size:13px;font-style:italic;}
#preview .hide-box{background:#fff8e1;border:1px dashed #f0c040;border-radius:4px;padding:10px 14px;margin:8px 0;color:#888;font-size:12px;text-align:center;}
#preview .dialog-container{margin:8px 0;}
#preview .xleft-bubble{display:flex;justify-content:flex-start;margin:4px 0;}
#preview .xleft-bubble span{background:#f0f0f0;border-radius:0 12px 12px 12px;padding:8px 14px;max-width:70%;font-size:13px;color:#333;}
#preview .xright-bubble{display:flex;justify-content:flex-end;margin:4px 0;}
#preview .xright-bubble span{background:#dcf8c6;border-radius:12px 0 12px 12px;padding:8px 14px;max-width:70%;font-size:13px;color:#333;}
#preview .xtable{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px;}
#preview .xtable th{background:#f5f5f0;border:1px solid #ddd;padding:8px 12px;text-align:left;font-weight:700;color:#333;}
#preview .xtable td{border:1px solid #ddd;padding:7px 12px;color:#555;}
#preview .xtable tr:nth-child(even) td{background:#fafafa;}
#preview .media-ph{background:#f0f0f0;border:1px solid #ddd;border-radius:6px;padding:10px 14px;margin:6px 0;font-size:12px;color:#888;text-align:center;}
#preview img.forum-img{max-width:100%;border-radius:4px;margin:4px 0;display:block;}
#preview .yt-embed{width:100%;aspect-ratio:16/9;border-radius:6px;border:none;margin:6px 0;}
@keyframes flyText{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 768px) {
  body { height: auto; overflow: auto; }

  header { padding: 8px 12px; gap: 8px; }
  .logo { font-size: 15px; }
  .hint-badge { display: none; }
  .header-actions { gap: 4px; flex-wrap: wrap; }
  .btn { padding: 4px 9px; font-size: 11px; }

  .main {
    display: flex;
    flex-direction: column;
    height: auto;
    overflow: visible;
  }

  /* Left panel: horizontal scrollable tag strip */
  .panel-left {
    border-right: none;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    flex-direction: row;
    max-height: none;
    padding: 6px 4px;
    gap: 0;
  }
  .section-group {
    display: flex;
    flex-direction: row;
    align-items: center;
    border-bottom: none;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .section-header { padding: 4px 8px; border-bottom: none; }
  .section-header .sec-arrow { display: none; }
  .section-header .sec-title { font-size: 9px; writing-mode: vertical-rl; text-orientation: mixed; padding: 2px 0; letter-spacing: 1px; }
  .section-body { display: flex !important; flex-direction: row; overflow-x: auto; }
  .section-body.hidden { display: flex !important; }

  .tag-btn {
    flex-direction: column;
    gap: 2px;
    padding: 6px 8px;
    min-width: 52px;
    border-left: none;
    border-bottom: 2px solid transparent;
    font-size: 11px;
    white-space: nowrap;
  }
  .tag-btn:hover { border-left: none; border-bottom-color: var(--gold); }
  .tag-btn .code { display: none; }
  .tag-btn .wrap-hint { display: none !important; }
  .tag-btn .icon { font-size: 16px; }
  .tag-btn .label { font-size: 10px; }

  /* Middle: editor full width */
  .panel-mid {
    height: auto;
    min-height: 260px;
  }
  .format-toolbar { gap: 2px; padding: 4px 6px; }
  .fmt-btn { padding: 3px 7px; font-size: 11px; }
  textarea#editor {
    min-height: 200px;
    height: 200px;
    flex: none;
    overflow-y: auto;
  }

  /* Preview: collapsible on mobile */
  .panel-right { border-top: 1px solid var(--border); }
  #preview { padding: 12px 14px; font-size: 13px; }

  /* Modal */
  .modal { width: 95vw; padding: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">✦ 流金編輯器</div>

  <div class="header-actions">
    <div class="hint-badge" data-i18n="selHint">💡 <b>選取文字</b>後按功能鍵可包裹標籤</div>
    <button class="btn btn-ghost" onclick="toggleLang()" id="langBtn">🌐 EN</button>
    <button class="btn btn-ghost" onclick="saveFile()" title="另存新檔">💾 <span data-i18n="save">另存新檔</span></button>
    <button class="btn btn-gold" onclick="copyCode()">📋 <span data-i18n="copyAll">複製全部</span></button>
  </div>
</header>

<div class="main">
<!-- ═══ LEFT PANEL ═══ -->
<div class="panel-left" id="leftPanel"></div>

<!-- ═══ MIDDLE PANEL ═══ -->
<div class="panel-mid">
  <div class="panel-header">
    <h3 data-i18n="editor">✏️ 編輯器</h3>
    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-ghost" id="splitMergeBtn" onclick="toggleSplitMerge()" title="分欄/合併預覽欄">合併</button>
      <button class="btn btn-ghost" id="previewToggleBtn" onclick="showMergedPreview()" title="預覽文章效果" style="display:none;">預覽</button>
      <button class="btn btn-ghost" onclick="stripBBCodeSel()" title="清除反白文字中的BBCode語法">選擇清除</button>
      <button class="btn btn-ghost" onclick="stripBBCode()" title="移除所有BBCode，只保留文字">清除語法</button>
      <button class="btn btn-ghost" onclick="clearEditor()" data-i18n="clear">清空</button>
    </div>
  </div>

  <!-- 格式工具列 -->
  <div class="format-toolbar">
    <button class="fmt-btn" onclick="undoAction()" title="復原 Ctrl+Z">↩</button>
    <button class="fmt-btn" onclick="redoAction()" title="取消復原 Ctrl+Y">↪</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="wrapFmt('b')" title="粗體"><b>B</b></button>
    <button class="fmt-btn" onclick="wrapFmt('i')" title="斜體"><i>I</i></button>
    <button class="fmt-btn" onclick="wrapFmt('u')" title="底線"><u>U</u></button>
    <button class="fmt-btn" onclick="wrapFmt('strike')" title="刪除線"><s>S</s></button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="openSizeModal()" title="文字大小">A↕</button>
    <button class="fmt-btn" onclick="openColorModal('color')" title="字體顏色">A<span style="color:#f0b429;">■</span></button>
    <button class="fmt-btn" onclick="openColorModal('backcolor')" title="背景顏色">A<span style="background:#f0b429;color:#000;padding:0 2px;">bg</span></button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="wrapFmt('align','left')" title="左對齊">⬅</button>
    <button class="fmt-btn" onclick="wrapFmt('align','center')" title="置中">≡</button>
    <button class="fmt-btn" onclick="wrapFmt('align','right')" title="右對齊">➡</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="insertAtCursor('[hr]\n')" title="分隔線（細灰色）">分隔線</button>

<script>
/* ═══════════════════════════════════════════
   I18N
═══════════════════════════════════════════ */
let lang = 'zh';
const i18n = {
  zh:{subtitle:'',selHint:'💡 <b>選取文字</b>後按功能鍵可包裹標籤',undo:'復原',save:'另存新檔',copyAll:'複製全部',editor:'✏️ 編輯器',clear:'清空',selActive:'已選取文字 — 點選功能鍵可包裹',preview:'👁 論壇預覽',previewHint:'← 從左側選擇標籤開始',refresh:'重新預覽',cancel:'取消',insert:'插入',charUnit:'字元',zhUnit:'中文：',insert_ok:'✅ 已插入！',copied:'✅ 已複製到剪貼簿！',saved:'✅ 已儲存為文字檔！',cleared:'已清空',confirmClear:'確定要清空編輯器嗎？'},
  en:{subtitle:'',selHint:'💡 <b>Select text</b> then click a tag to wrap',undo:'Undo',save:'Save As',copyAll:'Copy All',editor:'✏️ Editor',clear:'Clear',selActive:'Text selected — click a tag to wrap',preview:'👁 Preview',previewHint:'← Select a tag from the left',refresh:'Refresh',cancel:'Cancel',insert:'Insert',charUnit:' chars',zhUnit:'CJK: ',insert_ok:'✅ Inserted!',copied:'✅ Copied to clipboard!',saved:'✅ Saved as text file!',cleared:'Cleared',confirmClear:'Clear the editor?'}
};
function t(k){return i18n[lang][k]||k;}
function toggleLang(){lang=lang==='zh'?'en':'zh';document.getElementById('langBtn').textContent=lang==='zh'?'🌐 EN':'🌐 中文';document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'){el.placeholder=t(k)||el.placeholder;}else{el.innerHTML=i18n[lang][k]||el.innerHTML;}});buildLeftPanel();updatePreview();}

/* ═══════════════════════════════════════════
   UNDO STACK
═══════════════════════════════════════════ */
let undoStack=[];
let undoPtr=-1;
const MAX_UNDO=100;
function pushUndo(val){if(undoPtr<undoStack.length-1)undoStack=undoStack.slice(0,undoPtr+1);undoStack.push(val);if(undoStack.length>MAX_UNDO)undoStack.shift();undoPtr=undoStack.length-1;}
function undoAction(){if(undoPtr>0){undoPtr--;editor.value=undoStack[undoPtr];updatePreview();updateStats();}else if(undoPtr===0){editor.value='';updatePreview();updateStats();}}
function redoAction(){if(undoPtr<undoStack.length-1){undoPtr++;editor.value=undoStack[undoPtr];updatePreview();updateStats();}}
function handleKeyDown(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoAction();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redoAction();}
}
let undoTimer;
let saveEditorTimer;
function onEditorInput(){
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>pushUndo(editor.value),400);
  // Auto-save editor content to localStorage
  clearTimeout(saveEditorTimer);
  saveEditorTimer=setTimeout(()=>{
    try{localStorage.setItem('liujin_editor_content',editor.value);}catch(e){}
  },800);
  s2tConvert();
  // Auto-detect media links pasted into editor and save to gallery
  const val=editor.value;
  let m;
  // Postimages forum link [url=...][img]...[/img][/url]
  const imgRe=/\[url=([^\]]+)\]\[img\]([^\[]+)\[\/img\]\[\/url\]/g;
  while((m=imgRe.exec(val))!==null){addToGallery(m[2].trim(),'img');}
  // [ximg] and [img]
  const ximgRe=/\[ximg\]([^\[]+)\[\/ximg\]/g;
  while((m=ximgRe.exec(val))!==null){addToGallery(m[1].trim(),'img');}
  const imgRe2=/\[img\]([^\[]+)\[\/img\]/g;
  while((m=imgRe2.exec(val))!==null){addToGallery(m[1].trim(),'img');}
  // Video tags → save as 'vid' type
  const vidTags=['xmp4','xvmp4'];
  vidTags.forEach(tag=>{
    const re=new RegExp('\\['+tag+'\\]([^\\[]+)\\[\\/'+ tag+'\\]','g');
    while((m=re.exec(val))!==null){addToGallery(m[1].trim(),'vid');}
  });
  const svRe=/\[xsendvid\]([^\[]+)\[\/xsendvid\]/g;
  while((m=svRe.exec(val))!==null){addToGallery(m[1].trim(),'sendvid');}
  // YouTube/TikTok → save as 'yt' type
  ['xyoutube','xsyoutube'].forEach(tag=>{
    const re=new RegExp('\\['+tag+'\\]([^\\[]+)\\[\\/'+ tag+'\\]','g');
    while((m=re.exec(val))!==null){addToGallery(m[1].trim(),'yt');}
  });
  ['xtiktok'].forEach(tag=>{
    const re=new RegExp('\\['+tag+'\\]([^\\[]+)\\[\\/'+ tag+'\\]','g');
    while((m=re.exec(val))!==null){addToGallery(m[1].trim(),'tt');}
  });
  updatePreview();
  updateStats();
}

/* ═══════════════════════════════════════════
   S2T (Simplified → Traditional)
   Basic common substitution map
═══════════════════════════════════════════ */
const s2tMap={'爱':'愛','办':'辦','报':'報','边':'邊','变':'變','标':'標','长':'長','场':'場','车':'車','称':'稱','传':'傳','当':'當','党':'黨','东':'東','动':'動','对':'對','发':'發','风':'風','复':'復','给':'給','关':'關','观':'觀','国':'國','过':'過','还':'還','话':'話','画':'畫','汇':'匯','会':'會','机':'機','际':'際','进':'進','经':'經','来':'來','乐':'樂','离':'離','里':'裡','联':'聯','楼':'樓','么':'麼','门':'門','面':'麵','难':'難','农':'農','齐':'齊','气':'氣','钱':'錢','强':'強','请':'請','书':'書','数':'數','说':'說','台':'臺','题':'題','头':'頭','团':'團','万':'萬','为':'為','问':'問','现':'現','线':'線','响':'響','样':'樣','业':'業','义':'義','应':'應','语':'語','员':'員','远':'遠','战':'戰','这':'這','种':'種','专':'專','总':'總'};
function s2tConvert(){const ta=document.getElementById('editor');const pos=ta.selectionStart;let v=ta.value;let changed=false;for(const[s,t_]of Object.entries(s2tMap)){if(v.includes(s)){v=v.split(s).join(t_);changed=true;}}if(changed){ta.value=v;ta.selectionStart=ta.selectionEnd=pos;}}

/* ═══════════════════════════════════════════
   GALLERY
═══════════════════════════════════════════ */
// Gallery persisted in localStorage
const MAX_GALLERY=30;
let gallery=[];
try{const saved=localStorage.getItem('liujin_gallery');if(saved)gallery=JSON.parse(saved);}catch(e){}
function saveGallery(){try{localStorage.setItem('liujin_gallery',JSON.stringify(gallery.slice(0,MAX_GALLERY)));}catch(e){}}
function addToGallery(url,type='img'){if(gallery.find(g=>g.url===url))return;gallery.unshift({url,type,ts:Date.now()});if(gallery.length>MAX_GALLERY)gallery=gallery.slice(0,MAX_GALLERY);saveGallery();}
function clearGallery(){
  if(!gallery.length)return;
  if(!confirm('確定要清空所有圖庫暫存嗎？此操作無法復原。'))return;
  gallery=[];saveGallery();
  const grid=document.getElementById('galGrid');
  if(grid)renderGallery(grid);
  showToast('🗑 已清空圖庫');
}
function renderGallery(container){
  container.innerHTML='';
  const counter=document.getElementById('galCounter');
  if(counter)counter.textContent=`${gallery.length}/${MAX_GALLERY}`;
  if(!gallery.length){container.innerHTML='<div class="gallery-empty">尚無已儲存的圖片/影片連結<br><span style="font-size:10px;opacity:.7;">上傳或插入圖片/影片後會自動記錄</span></div>';return;}
  gallery.forEach((g,i)=>{
    const d=document.createElement('div');
    d.className='gallery-item';
    let thumbHtml='',typeLabel='',bbInsert='';
    if(g.type==='img'){
      typeLabel='圖片';bbInsert=`[ximg]${g.url}[/ximg]\n`;
      thumbHtml=`<img class="gal-thumb" src="${g.url}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2290%22 height=%2290%22><rect fill=%22%23222%22 width=%22100%25%22 height=%22100%25%22/><text x=%2250%25%22 y=%2255%25%22 font-size=%2216%22 fill=%22%23666%22 text-anchor=%22middle%22>!</text></svg>'>`;
    } else if(g.type==='vid'){
      typeLabel='MP4 影片';bbInsert=`[xmp4]${g.url}[/xmp4]\n`;
      thumbHtml=`<canvas class="gal-thumb" id="galvc${i}" style="background:#1a1a1a;"></canvas>`;
    } else if(g.type==='sendvid'){
      typeLabel='Sendvid';bbInsert=`[xsendvid]${g.url}[/xsendvid]\n`;
      thumbHtml=`<div class="gal-thumb-placeholder" style="background:#0a1628;">📺</div>`;
    } else if(g.type==='yt'){
      typeLabel='YouTube';bbInsert=`[xyoutube]${g.url}[/xyoutube]\n`;
      thumbHtml=`<div class="gal-thumb-placeholder" style="background:#1a1a2e;">▶️</div>`;
    } else if(g.type==='tt'){
      typeLabel='TikTok';bbInsert=`[xtiktok]${g.url}[/xtiktok]\n`;
      thumbHtml=`<div class="gal-thumb-placeholder" style="background:#111;">🎶</div>`;
    } else {
      typeLabel='檔案';bbInsert=`[ximg]${g.url}[/ximg]\n`;
      thumbHtml=`<div class="gal-thumb-placeholder">📎</div>`;
    }
    d.innerHTML=`${thumbHtml}<div class="gal-info"><div class="gal-type">${typeLabel}</div><div class="gal-url">${g.url}</div><div class="gal-hint">點擊插入 BBCode</div></div><button class="gal-del" onclick="event.stopPropagation();gallery.splice(${i},1);saveGallery();renderGallery(document.getElementById('galGrid'))">✕</button>`;
    d.title=g.url;
    d.onclick=()=>{insertAtCursor(bbInsert);closeModal();};
    container.appendChild(d);
    if(g.type==='vid'){
      (function(url,idx){setTimeout(()=>{const cv=document.getElementById('galvc'+idx);if(!cv)return;const v=document.createElement('video');v.src=url;v.muted=true;v.playsInline=true;v.addEventListener('loadeddata',()=>{v.currentTime=0.5;});v.addEventListener('seeked',()=>{cv.width=90;cv.height=90;cv.getContext('2d').drawImage(v,0,0,90,90);v.remove();});v.load();},120);})(g.url,i);
    }
  });
}

/* ═══════════════════════════════════════════
   SELECTION
═══════════════════════════════════════════ */
const editor=document.getElementById('editor');
let savedSel={start:0,end:0,text:''};

function checkSel(){
  const s=editor.selectionStart, e=editor.selectionEnd, has=s!==e;
  if(has){
    savedSel={start:s,end:e,text:editor.value.slice(s,e)};
  } else {
    savedSel={start:s,end:s,text:''};
  }
  document.body.classList.toggle('has-selection',has);
  document.getElementById('selectionBar').classList.toggle('visible',has);
}

// Clear selection state when clicking outside the editor
document.addEventListener('mousedown',e=>{
  if(e.target!==editor && !editor.contains(e.target)){
    setTimeout(()=>{
      if(editor.selectionStart===editor.selectionEnd){
        savedSel={start:0,end:0,text:''};
        document.body.classList.remove('has-selection');
        document.getElementById('selectionBar').classList.remove('visible');
      }
    },150);
  }
});

// Re-read live selection right before wrapping (fixes mobile select-all bug)
function getLiveSel(){
  const s=editor.selectionStart, e=editor.selectionEnd;
  if(s!==e) return {start:s,end:e,text:editor.value.slice(s,e)};
  return savedSel;
}

/* ═══════════════════════════════════════════
   INSERT / WRAP
═══════════════════════════════════════════ */
function insertAtCursor(txt){pushUndo(editor.value);const s=editor.selectionStart,e=editor.selectionEnd;editor.value=editor.value.slice(0,s)+txt+editor.value.slice(e);editor.selectionStart=editor.selectionEnd=s+txt.length;editor.focus();updatePreview();updateStats();}
function wrapSel(tag,attr){
  // Always use live selection at moment of click
  const live=getLiveSel();
  if(!live.text) return;
  const{start,end,text}=live;
  const open=attr?`[${tag}=${attr}]`:`[${tag}]`;
  const close=`[/${tag}]`;
  pushUndo(editor.value);
  const wrapped=open+text+close;
  editor.value=editor.value.slice(0,start)+wrapped+editor.value.slice(end);
  // Keep selection on the wrapped content so user can chain more wraps
  editor.selectionStart=start;
  editor.selectionEnd=start+wrapped.length;
  editor.focus();
  // Update savedSel to the new wrapped content (for chaining multiple wraps)
  savedSel={start:start,end:start+wrapped.length,text:wrapped};
  // Keep selection bar visible so user can keep wrapping
  document.body.classList.add('has-selection');
  document.getElementById('selectionBar').classList.add('visible');
  updatePreview();updateStats();
}
const directWrap=['xgold','xcenter','xgban','xnote','xwarn','xblue','xgreen','xred','xinfo','xglass','xsmall','quote','xquote','xtag','b','i','u','strike'];
function wrapOrModal(tag){
  const live=getLiveSel();
  if(live.text&&directWrap.includes(tag)){wrapSel(tag);}
  else{openModal(tag);}
}
function wrapFmt(tag,attr){
  const live=getLiveSel();
  if(live.text){
    wrapSel(tag,attr);
  } else {
    const cursor=`[${tag}${attr?'='+attr:''}][/${tag}]`;
    insertAtCursor(cursor);
    // Move cursor inside the tags
    const pos=editor.selectionStart-(tag.length+3+(attr?attr.length+1:0));
    editor.selectionStart=editor.selectionEnd=pos;
  }
}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function updateStats(){const v=editor.value;document.getElementById('charCount').textContent=v.length+t('charUnit');const zh=(v.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g)||[]).length;document.getElementById('zhCount').textContent=t('zhUnit')+zh+'字';}

/* ═══════════════════════════════════════════
   FILE OPS
═══════════════════════════════════════════ */
async function saveFile(){
  const content_=editor.value;
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:'流金.txt',
        types:[{description:'文字檔',accept:{'text/plain':['.txt']}}]
      });
      const w=await fh.createWritable();
      await w.write(content_);
      await w.close();
      showToast(t('saved'));
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  // fallback
  const blob=new Blob([content_],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='流金.txt';a.click();
  showToast(t('saved'));
}
function copyCode(){if(!editor.value.trim())return;navigator.clipboard.writeText(editor.value).then(()=>showToast(t('copied')));}
/* ═══════════════════════════════════════════
   SPLIT / MERGE VIEW
═══════════════════════════════════════════ */
let isMerged = false;

function toggleSplitMerge(){
  isMerged = !isMerged;
  const panelRight = document.querySelector('.panel-right');
  const main = document.querySelector('.main');
  const splitBtn = document.getElementById('splitMergeBtn');
  const previewBtn = document.getElementById('previewToggleBtn');

  if(isMerged){
    // Merged: hide right panel, editor takes full width
    panelRight.style.display = 'none';
    main.style.gridTemplateColumns = '240px 1fr';
    splitBtn.textContent = '分欄';
    previewBtn.style.display = '';
    // Mobile: single column
    if(window.innerWidth <= 768){
      main.style.gridTemplateColumns = '1fr';
    }
  } else {
    // Split: show right panel again
    panelRight.style.display = '';
    main.style.gridTemplateColumns = '240px 1fr 1fr';
    splitBtn.textContent = '合併';
    previewBtn.style.display = 'none';
    // Hide overlay preview if open
    const overlay = document.getElementById('previewOverlay');
    if(overlay) overlay.style.display = 'none';
    if(window.innerWidth <= 768){
      main.style.gridTemplateColumns = '1fr';
    }
  }
}

function showMergedPreview(){
  // Show a fullscreen overlay with the preview content
  let overlay = document.getElementById('previewOverlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'previewOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:300;display:flex;flex-direction:column;overflow:hidden;';
    overlay.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f5f5f0;border-bottom:1px solid #ddd;flex-shrink:0;">
        <span style="font-size:13px;font-weight:600;color:#666;">👁 論壇預覽</span>
        <button onclick="document.getElementById('previewOverlay').style.display='none'" style="background:#e0e0e0;border:none;border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;">✕ 關閉</button>
      </div>
      <div id="previewOverlayBody" style="flex:1;overflow-y:auto;padding:18px 22px;font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.8;color:#333;"></div>
    `;
    document.body.appendChild(overlay);
  }
  // Copy current preview content
  document.getElementById('previewOverlayBody').innerHTML = document.getElementById('preview').innerHTML;
  overlay.style.display = 'flex';
}

// Init: on mobile, start in merged mode automatically
window.addEventListener('DOMContentLoaded',()=>{
  if(window.innerWidth <= 768){
    // auto-merge on mobile for better UX
    setTimeout(toggleSplitMerge, 50);
  }
});

function stripBBCode(){
  if(!editor.value.trim()) return;
  pushUndo(editor.value);
  let v = editor.value;
  const knownTags = [
    'b','i','u','strike','size','color','backcolor','align','hr','code','url',
    'img','ximg','xmp4','xvmp4','xmp3','xsound','xyoutube','xsyoutube','xtiktok','xsendvid',
    'xmap','xmaplink','xhr','xgold','xcenter','xgban','xnote','xwarn','xblue','xgreen',
    'xred','xinfo','xglass','xsmall','xquote','quote','xtag','xrate','xbtn','xspoiler',
    'xcard','xleft','xright','xthead','xtr','hide','fly','move'
  ];
  const tagPattern = knownTags.join('|');
  v = v.replace(new RegExp(`\\[\\/?(?:${tagPattern})(?:=[^\\]]+)?\\]`, 'gi'), '');
  editor.value = v;
  updatePreview(); updateStats();
  showToast('✅ 已清除所有 BBCode 語法');
}

function stripBBCodeSel(){
  const live = getLiveSel();
  if(!live.text){ showToast('⚠️ 請先反白要清除語法的文字'); return; }
  pushUndo(editor.value);
  const knownTags = [
    'b','i','u','strike','size','color','backcolor','align','hr','code','url',
    'img','ximg','xmp4','xvmp4','xmp3','xsound','xyoutube','xsyoutube','xtiktok','xsendvid',
    'xmap','xmaplink','xhr','xgold','xcenter','xgban','xnote','xwarn','xblue','xgreen',
    'xred','xinfo','xglass','xsmall','xquote','quote','xtag','xrate','xbtn','xspoiler',
    'xcard','xleft','xright','xthead','xtr','hide','fly','move'
  ];
  const tagPattern = knownTags.join('|');
  const cleaned = live.text.replace(new RegExp(`\\[\\/?(?:${tagPattern})(?:=[^\\]]+)?\\]`, 'gi'), '');
  editor.value = editor.value.slice(0, live.start) + cleaned + editor.value.slice(live.end);
  editor.selectionStart = live.start;
  editor.selectionEnd = live.start + cleaned.length;
  editor.focus();
  savedSel = {start: live.start, end: live.start + cleaned.length, text: cleaned};
  updatePreview(); updateStats();
  showToast('✅ 已清除選取範圍內的 BBCode 語法');
}

function clearEditor(){if(editor.value&&confirm(t('confirmClear'))){pushUndo(editor.value);editor.value='';
    try{localStorage.removeItem('liujin_editor_content');}catch(e){}updatePreview();updateStats();savedSel={start:0,end:0,text:''}; document.body.classList.remove('has-selection');document.getElementById('selectionBar').classList.remove('visible');}}
function showToast(msg){const t_=document.getElementById('toast');t_.textContent=msg;t_.classList.add('show');setTimeout(()=>t_.classList.remove('show'),2500);}

/* ═══════════════════════════════════════════
   MEDIA ID PARSING
═══════════════════════════════════════════ */
function extractYTId(input){input=input.trim();if(/^[a-zA-Z0-9_-]{11}$/.test(input))return input;try{const u=new URL(input);if(u.hostname==='youtu.be')return u.pathname.slice(1).split('?')[0];if(u.searchParams.get('v'))return u.searchParams.get('v');const sm=u.pathname.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);if(sm)return sm[1];const em=u.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);if(em)return em[1];}catch(e){}const m=input.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function extractTTId(input){input=input.trim();if(/^\d{15,20}$/.test(input))return input;try{const u=new URL(input);const m=u.pathname.match(/\/video\/(\d+)/);if(m)return m[1];}catch(e){}const m=input.match(/\/video\/(\d+)/);return m?m[1]:null;}

/* ═══════════════════════════════════════════
   SENDVID
═══════════════════════════════════════════ */
function extractSendvidId(input){
  input=input.trim();
  // already an ID: alphanumeric 6-12 chars
  if(/^[a-z0-9]{4,12}$/.test(input))return input;
  try{const u=new URL(input);const m=u.pathname.match(/\/([a-z0-9]{4,12})$/i);if(m)return m[1];}catch(e){}
  const m=input.match(/sendvid\.com\/([a-z0-9]{4,12})/i);
  return m?m[1]:null;
}
function prevSendvid(){
  const v=document.getElementById('f1').value;
  const id=extractSendvidId(v);
  const prev=document.getElementById('svPrev');
  const err=document.getElementById('svErr');
  const embed=document.getElementById('svEmbed');
  if(!v.trim()){prev.textContent='';err.textContent='';embed.innerHTML='';return;}
  if(id){
    prev.textContent=`✅ ID：${id}  →  [xsendvid]${id}[/xsendvid]`;
    err.textContent='';
    embed.innerHTML=`<iframe src="https://sendvid.com/embed/${id}" style="width:100%;aspect-ratio:16/9;border-radius:6px;border:none;" allowfullscreen loading="lazy"></iframe>`;
  }else{
    prev.textContent='';
    err.textContent='❌ 無法解析 Sendvid ID，請確認網址格式';
    embed.innerHTML='';
  }
}

  document.getElementById('modalBody').innerHTML=html;
  overlay.classList.add('active');
  setTimeout(()=>{

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* table builder */
let tblRowCount=0;
let tblColCount=2;
function initTable(cols){
  tblColCount=cols;
  renderHeaderRow();
  document.getElementById('tblRows').innerHTML='';
  tblRowCount=0;
  addTableRow();addTableRow();
}
function renderHeaderRow(){
  const hr=document.getElementById('tblHeaderRow');
  if(!hr)return;
  hr.style.gridTemplateColumns=`repeat(${tblColCount},1fr) 28px`;
  hr.innerHTML=Array.from({length:tblColCount},(_,i)=>`<input placeholder="標題${i+1}" class="tbl-header-cell" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;">`).join('')+'<span></span>';
}
function changeColCount(delta){
  tblColCount=Math.max(1,Math.min(8,tblColCount+delta));
  document.getElementById('colCountDisplay').textContent=tblColCount;
  renderHeaderRow();
  // re-render all existing rows with new col count
  const rows=[...document.querySelectorAll('#tblRows .tbl-row')];
  rows.forEach(r=>{
    const existing=[...r.querySelectorAll('.tbl-cell')].map(i=>i.value);
    r.style.gridTemplateColumns=`repeat(${tblColCount},1fr) 28px`;
    const cells=r.querySelectorAll('.tbl-cell');
    // add missing cols
    const delBtn=r.querySelector('.tbl-del-btn');
    while(r.querySelectorAll('.tbl-cell').length<tblColCount){
      const inp=document.createElement('input');
      inp.className='tbl-cell';inp.placeholder='內容';
      inp.style.cssText='background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;';
      r.insertBefore(inp,delBtn);
    }
    // remove extra cols
    while(r.querySelectorAll('.tbl-cell').length>tblColCount){
      r.querySelectorAll('.tbl-cell')[r.querySelectorAll('.tbl-cell').length-1].remove();
    }
  });
}
function addTableRow(){
  tblRowCount++;
  const container=document.getElementById('tblRows');
  const row=document.createElement('div');
  row.className='tbl-row';
  row.style.gridTemplateColumns=`repeat(${tblColCount},1fr) 28px`;
  const cells=Array.from({length:tblColCount},()=>`<input class="tbl-cell" placeholder="內容" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;">`).join('');
  row.innerHTML=cells+`<button class="tbl-del-btn" onclick="this.closest('.tbl-row').remove()">✕</button>`;
  container.appendChild(row);
}

/* dialog row builder */
let dialogRowCount=0;
function addDialogRow(side){

/* ═══════════════════════════════════════════
   CONFIRM INSERT
═══════════════════════════════════════════ */
function confirmInsert(){
  let code='';
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim():''; };

  switch(currentTag){
    case 'xgold':case 'xcenter':case 'xgban':case 'xnote':case 'xwarn':case 'xblue':case 'xgreen':case 'xred':case 'xinfo':case 'xglass':case 'xtag':
      code=`[${currentTag}]${g('f1')}[/${currentTag}]\n`;break;
    case 'xspoiler': code=`[xspoiler=${g('f1')}]${g('f2')}[/xspoiler]\n`;break;
    case 'xsmall': code=`[xsmall]${g('f1')}[/xsmall]\n`;break;
    case 'xcard': code=`[xcard=${g('f1')}]${g('f2')}[/xcard]\n`;break;

    case 'quote':case 'xquote': code=`[${currentTag}]${g('f1')}[/${currentTag}]\n`;break;
    case 'xrate': code=`[xrate]${g('f1')}[/xrate]\n`;break;
    case 'xbtn': code=`[xbtn=${g('f1')}]${g('f2')}[/xbtn]\n`;break;
    case 'xyoutube':case 'xsyoutube':{const id=extractYTId(g('f1'));if(!id){showToast('❌ 無法解析 YouTube ID');return;}addToGallery(id,'yt');code=`[${currentTag}]${id}[/${currentTag}]\n`;break;}
    case 'xtiktok':{const id=extractTTId(g('f1'));if(!id){showToast('❌ 無法解析 TikTok ID');return;}addToGallery(id,'tt');code=`[xtiktok]${id}[/xtiktok]\n`;break;}
    case 'xmp4':case 'xvmp4':{const u=g('f1');if(u)addToGallery(u,'vid');code=`[${currentTag}]${u}[/${currentTag}]\n`;break;}
    case 'xmp3': code=`[xmp3]${g('f1')}[/xmp3]\n`;break;
    case 'xsound': code=`[xsound]${g('f1')}[/xsound]\n`;break;
    case 'xsendvid':{const id=extractSendvidId(g('f1'));if(!id){showToast('❌ 無法解析 Sendvid ID');return;}addToGallery(id,'sendvid');code=`[xsendvid]${id}[/xsendvid]\n`;break;}
    case 'xmap': code=`[xmap]${g('f1')}[/xmap]\n`;break;
    case 'xmaplink': code=`[xmaplink]${g('f1')}[/xmaplink]\n`;break;
    case 'ximg':{const url=g('f1');if(url)addToGallery(url,'img');code=`[ximg]${url}[/ximg]\n`;break;}
    case 'catbox':{
      const cbEl=document.getElementById('cbUrl');
      const cbRaw=cbEl?cbEl.value.trim():'';
      if(!cbRaw){showToast('❌ 請貼上 Catbox 連結');return;}
      if(!cbRaw.startsWith('http')){showToast('❌ 請貼上有效的網址');return;}
      if(catboxType==='img'){
        addToGallery(cbRaw,'img');
        code=`[ximg]${cbRaw}[/ximg]\n`;
      } else {
        addToGallery(cbRaw,'vid');
        code=`[xmp4]${cbRaw}[/xmp4]\n`;
      }
      break;}
    case 'postimages':{
      const el=document.getElementById('piUrl');
      const raw=el?el.value.trim():'';
      if(!raw){showToast('❌ 請貼上論壇外連代碼');return;}
      const m=raw.match(/\[url=([^\]]+)\]\[img\]([^\[]+)\[\/img\]\[\/url\]/);
      if(!m){showToast('❌ 格式不符，請貼上論壇外連代碼');return;}
      addToGallery(m[2].trim(),'img');
      code=raw+'\n';
      break;}
    case 'dialog':{
      const rows=[...document.querySelectorAll('#dialogRows .dialog-row')];
      code=rows.map(r=>{
        const side=r.dataset.side;
        const txt=r.querySelector('input').value.trim();
        return txt?`[x${side}]${txt}[/x${side}]`:'';
      }).filter(Boolean).join('')+'\n';
      break;}
    case 'xtable':{
      const head=g('tblHead');
      const headerCells=[...document.querySelectorAll('#tblHeaderRow .tbl-header-cell')].map(i=>i.value.trim());
      const dataRows=[...document.querySelectorAll('#tblRows .tbl-row')];
      const colCount=tblColCount;
      if(colCount===1){
        // single col: use xtr= format
        const rows=dataRows.map(r=>{const cells=[...r.querySelectorAll('.tbl-cell')];return{k:headerCells[0]||'',v:cells[0]?cells[0].value.trim():''};}).filter(r=>r.v);
        code=`[xthead]${head}[/xthead]\n`+rows.map(r=>`[xtr=${r.k}]${r.v}[/xtr]`).join('\n')+'\n';
      } else {
        // multi-col: build HTML table style via xtr with pipe delimiter
        // header row
        code=`[xthead]${head}[/xthead]\n`;
        if(headerCells.some(c=>c)){code+=`[xtr=${headerCells[0]||''}]${headerCells.slice(1).join('|')}[/xtr]\n`;}
        dataRows.forEach(r=>{
          const cells=[...r.querySelectorAll('.tbl-cell')].map(i=>i.value.trim());
          if(cells.some(c=>c))code+=`[xtr=${cells[0]||''}]${cells.slice(1).join('|')}[/xtr]\n`;
        });
      }
      break;}
    case 'hide':{const num=g('f1');const type_=g('f2');const cnt=g('f3');code=`[hide=${num},${type_}]${cnt}[/hide]\n`;break;}
    case 'size':{const s=g('f1');if(!s){closeModal();return;}const txt=savedSel.text||'文字';code=`[size=${s}]${txt}[/size]`;break;}
    case 'colorpicker':{const c=selectedColor;const txt=savedSel.text||'文字';code=`[${colorModalTag}=${c}]${txt}[/${colorModalTag}]`;break;}
  }
  if(code){insertAtCursor(code);showToast(t('insert_ok'));}
  closeModal();
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function closeModalOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('active')){
    const a=document.activeElement;
    if(a&&a.tagName!=='TEXTAREA'&&a.tagName!=='SELECT'&&!a.classList.contains('tbl-add-btn')&&a.id!=='modalOK'){e.preventDefault();confirmInsert();}
  }
});

/* ═══════════════════════════════════════════
   PREVIEW RENDERER
═══════════════════════════════════════════ */
function updatePreview(){
  let h=editor.value;
  // Extract [code] blocks FIRST (before any other processing) to preserve literal content
  const codePlaceholders=[];
  h=h.replace(/\[code\]([\s\S]*?)\[\/code\]/g,(match,inner)=>{
    const escaped=inner.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\[/g,'&#91;').replace(/\]/g,'&#93;');
    const ph=`«code${codePlaceholders.length}»`;
    codePlaceholders.push(`<pre style="background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:10px;font-family:monospace;font-size:12px;white-space:pre-wrap;overflow-x:auto;">${escaped}</pre>`);
    return ph;
  });
  // basic format
  h=h.replace(/\[b\]([\s\S]*?)\[\/b\]/g,'<b>$1</b>');
  h=h.replace(/\[i\]([\s\S]*?)\[\/i\]/g,'<i>$1</i>');
  h=h.replace(/\[u\]([\s\S]*?)\[\/u\]/g,'<u>$1</u>');
  h=h.replace(/\[strike\]([\s\S]*?)\[\/strike\]/g,'<s>$1</s>');
  h=h.replace(/\[fly\]([\s\S]*?)\[\/fly\]/g,'<span style="display:inline-block;animation:flyText 3s linear infinite;white-space:nowrap;">$1</span>');
  h=h.replace(/\[move\]([\s\S]*?)\[\/move\]/g,'<marquee scrollamount="3" style="display:block;">$1</marquee>');
  h=h.replace(/\[size=(\d+)\]([\s\S]*?)\[\/size\]/g,(_,s,c)=>`<span style="font-size:${8+parseInt(s)*2}px">${c}</span>`);
  h=h.replace(/\[color=(#[0-9a-fA-F]{3,8}|[a-z]+)\]([\s\S]*?)\[\/color\]/g,'<span style="color:$1">$2</span>');
  h=h.replace(/\[backcolor=(#[0-9a-fA-F]{3,8}|[a-z]+)\]([\s\S]*?)\[\/backcolor\]/g,'<span style="background:$1;padding:0 2px;">$2</span>');
  h=h.replace(/\[align=left\]([\s\S]*?)\[\/align\]/g,'<div style="text-align:left">$1</div>');
  h=h.replace(/\[align=center\]([\s\S]*?)\[\/align\]/g,'<div style="text-align:center">$1</div>');
  h=h.replace(/\[align=right\]([\s\S]*?)\[\/align\]/g,'<div style="text-align:right">$1</div>');
  h=h.replace(/\[hr\]/g,'<hr style="border:none;border-top:1px solid #ccc;margin:10px 0;opacity:.7;">');
  // [code] handled at top of function

  // [url=LINK][img]LINK[/img][/url] — Postimages 論壇外連，最優先
  h=h.replace(/\[url=([^\]]+)\]\[img\]([\s\S]*?)\[\/img\]\[\/url\]/g,
    (_,href,src)=>`<a href="${href}" target="_blank"><img class="forum-img" src="${src.trim()}" onerror="this.style.display='none'"></a>`);
  h=h.replace(/\[url=([^\]]+)\]\[ximg\]([\s\S]*?)\[\/ximg\]\[\/url\]/g,
    (_,href,src)=>`<a href="${href}" target="_blank"><img class="forum-img" src="${src.trim()}" onerror="this.style.display='none'"></a>`);
  // plain url
  h=h.replace(/\[url\]([\s\S]*?)\[\/url\]/g,'<a href="$1" style="color:#3b82f6" target="_blank">$1</a>');
  h=h.replace(/\[url=([^\]]+)\]([\s\S]*?)\[\/url\]/g,'<a href="$1" style="color:#3b82f6" target="_blank">$2</a>');

  // xhr
  h=h.replace(/\[xhr\]x\[\/xhr\]/g,'<hr class="xhr-line">');

  // block map (simple wrap tags)
  const bm=[
    ['xgold',c=>`<div class="xgold-box">${c}</div>`],
    ['xcenter',c=>`<div class="xcenter-box">${c}</div>`],
    ['xgban',c=>`<div class="xgban-box">${c}</div>`],
    ['xnote',c=>`<div class="xnote-box">${c}</div>`],
    ['xwarn',c=>`<div class="xwarn-box">${c}</div>`],
    ['xblue',c=>`<div class="xblue-box">${c}</div>`],
    ['xgreen',c=>`<div class="xgreen-box">${c}</div>`],
    ['xred',c=>`<div class="xred-box">${c}</div>`],
    ['xinfo',c=>`<div class="xinfo-box">${c}</div>`],
    ['xglass',c=>`<div class="xglass-box">${c}</div>`],
    ['xquote',c=>`<div class="xquote-box">${c}</div>`],
    ['quote',c=>`<div class="quote-box">${c}</div>`],
    ['xtag',c=>`<span class="xtag-pill">${c}</span>`],
    ['xrate',c=>`<span class="xrate-badge">★ ${c} / 10</span>`],
    ['xsmall',c=>`<span class="xsmall-text">${c}</span>`],
    ['ximg',c=>`<img class="forum-img" src="${c}" onerror="this.style.display='none'">`],
    ['img',c=>`<img class="forum-img" src="${c}" onerror="this.style.display='none'">`],
    ['xmp4',c=>`<video class="forum-img" controls style="max-width:100%;border-radius:6px;margin:4px 0;"><source src="${c}" type="video/mp4">MP4: ${c}</video>`],
    ['xvmp4',c=>`<video class="forum-img" controls style="max-width:320px;border-radius:6px;margin:4px 0;"><source src="${c}" type="video/mp4">MP4: ${c}</video>`],
    ['xmp3',c=>`<audio controls style="width:100%;margin:6px 0;"><source src="${c}" type="audio/mpeg">MP3: ${c}</audio>`],
    ['xsound',c=>{
      const encoded=encodeURIComponent(c.trim());
      return `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" loading="lazy" style="border-radius:8px;margin:6px 0;" src="https://w.soundcloud.com/player/?url=${encoded}&color=%23f0b429&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>`;
    }],
    ['xmaplink',c=>`<div style="margin:6px 0"><div class="media-ph" style="margin-bottom:4px;">📍 <a href="https://www.google.com/maps/search/${encodeURIComponent(c)}" target="_blank" style="color:#3b82f6">🗺 在 Google Maps 搜尋「${c}」</a></div><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(c)}&output=embed&z=15" style="width:100%;height:200px;border:none;border-radius:8px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`],
    ['xmap',c=>`<div style="margin:6px 0"><div class="media-ph" style="margin-bottom:4px;">🗺 <a href="https://www.google.com/maps?q=${encodeURIComponent(c)}" target="_blank" style="color:#3b82f6">在 Google Maps 查看座標 ${c}</a></div><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(c)}&output=embed&z=15" style="width:100%;height:200px;border:none;border-radius:8px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>`],
  ];
  for(const [tag,fn] of bm){
    h=h.replace(new RegExp(`\\[${tag}\\]([\\s\\S]*?)\\[\\/${tag}\\]`,'g'),(_,c)=>fn(c.trim()));
  }

  // YouTube embed (actual iframe preview)
  h=h.replace(/\[xyoutube\]([\s\S]*?)\[\/xyoutube\]/g,
    (_,id)=>`<iframe class="yt-embed" src="https://www.youtube.com/embed/${id.trim()}" allowfullscreen loading="lazy"></iframe>`);
  h=h.replace(/\[xsyoutube\]([\s\S]*?)\[\/xsyoutube\]/g,
    (_,id)=>`<iframe style="width:280px;aspect-ratio:9/16;max-height:500px;border-radius:10px;border:none;margin:6px 0;display:block;" src="https://www.youtube.com/embed/${id.trim()}" allowfullscreen loading="lazy"></iframe>`);

  // TikTok: vertical iframe embed
  h=h.replace(/\[xtiktok\]([\s\S]*?)\[\/xtiktok\]/g,
    (_,id)=>{
      const tid=id.trim();
      return `<div style="display:flex;flex-direction:column;align-items:flex-start;margin:6px 0;">
        <iframe src="https://www.tiktok.com/embed/v2/${tid}" style="width:280px;height:500px;border-radius:10px;border:none;display:block;" allowfullscreen loading="lazy"></iframe>
        <div class="media-ph" style="margin-top:4px;font-size:11px;">🎶 TikTok ID: <a href="https://www.tiktok.com/video/${tid}" target="_blank" style="color:#3b82f6">${tid}</a></div>
      </div>`;
    });

  // Sendvid embed
  h=h.replace(/\[xsendvid\]([\s\S]*?)\[\/xsendvid\]/g,
    (_,id)=>`<iframe src="https://sendvid.com/embed/${id.trim()}" style="width:100%;aspect-ratio:16/9;border-radius:6px;border:none;margin:6px 0;display:block;" allowfullscreen loading="lazy"></iframe>`);

  // xspoiler — clickable spoiler
  h=h.replace(/\[xspoiler=([^\]]+)\]([\s\S]*?)\[\/xspoiler\]/g,(_,btn,body)=>{
    const id='sp'+Math.random().toString(36).slice(2,7);
    return `<div class="xspoiler-wrap">
      <div id="${id}_btn" onclick="(function(){var b=document.getElementById('${id}_body'),a=document.getElementById('${id}_btn');var open=b.style.display!=='none';b.style.display=open?'none':'block';a.innerHTML=(open?'▶ ':'▼ ')+'${btn.replace(/'/g,"\'")}';})();" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:7px 12px;background:#f0f0f0;border:1px solid #ddd;border-radius:5px;font-size:13px;user-select:none;">▶ ${btn}</div>
      <div id="${id}_body" style="display:none;padding:10px 14px;background:#fafafa;border:1px solid #ddd;border-top:none;border-radius:0 0 5px 5px;font-size:13px;color:#333;">${body.trim()}</div>
    </div>`;
  });
  // xcard
  h=h.replace(/\[xcard=([^\]]+)\]([\s\S]*?)\[\/xcard\]/g,
    (_,t_,b)=>`<div class="xcard-box"><div class="xcard-title">${t_}</div><div class="xcard-body">${b.trim()}</div></div>`);
  // xbtn
  h=h.replace(/\[xbtn=([^\]]+)\]([\s\S]*?)\[\/xbtn\]/g,
    (_,url,text)=>`<a class="xbtn-link" href="${url}" target="_blank">${text.trim()}</a>`);

  // dialog — handle each tag independently (supports consecutive same-side bubbles)
  h=h.replace(/\[xleft\]([\s\S]*?)\[\/xleft\]/g,(_,c)=>`<div class="xleft-bubble"><span>${c.trim()}</span></div>`);
  h=h.replace(/\[xright\]([\s\S]*?)\[\/xright\]/g,(_,c)=>`<div class="xright-bubble"><span>${c.trim()}</span></div>`);

  // table
  h=h.replace(/\[xthead\]([\s\S]*?)\[\/xthead\]((?:\s*\[xtr=[^\]]+\][\s\S]*?\[\/xtr\])*)/g,(_,head,rest)=>{
    const rows=[...rest.matchAll(/\[xtr=([^\]]+)\]([\s\S]*?)\[\/xtr\]/g)].map(([,k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join('');
    return `<table class="xtable"><tr><th colspan="2">${head.trim()}</th></tr>${rows}</table>`;
  });
  h=h.replace(/\[xtr=[^\]]+\][\s\S]*?\[\/xtr\]/g,'');

  // hide — show lock bar + content preview
  const hideTypes={'1':'發文數','2':'超激值','3':'回應好評度','4':'發文好評度','5':'熱心好評度','6':'歲月值'};
  h=h.replace(/\[hide=(\d+),(\d+)\]([\s\S]*?)\[\/hide\]/g,(_,num,type,cnt)=>`<div class="hide-box"><div style="margin-bottom:6px;">🔒 需要 ${num} ${hideTypes[type]||'歲月值'} 才能觀看</div><div style="padding:8px;border-radius:5px;background:rgba(0,0,0,0.04);font-size:12px;color:#555;border:1px dashed #ddd;">${cnt.trim()||'（無內容）'}</div></div>`);
  h=h.replace(/\[hide=(\d+)\]([\s\S]*?)\[\/hide\]/g,(_,num,cnt)=>`<div class="hide-box"><div style="margin-bottom:6px;">🔒 需要 ${num} 歲月值 才能觀看</div><div style="padding:8px;border-radius:5px;background:rgba(0,0,0,0.04);font-size:12px;color:#555;border:1px dashed #ddd;">${cnt.trim()||'（無內容）'}</div></div>`);

  // newline
  h=h.replace(/\n/g,'<br>');
  // Restore [code] block placeholders
  codePlaceholders.forEach((html,i)=>{h=h.replace(`«code${i}»`,html);});
  document.getElementById('preview').innerHTML=h||'<p style="color:#aaa;font-size:13px;text-align:center;margin-top:50px;">← 從左側選擇標籤開始</p>';
}

/* ═══════════════════════════════════════════
   CATBOX AUTO UPLOAD
═══════════════════════════════════════════ */
const CATBOX_API='https://catbox.moe/user/api.php';

editor.addEventListener('dragover',e=>{e.preventDefault();editor.classList.add('dragging');});
editor.addEventListener('dragleave',()=>{editor.classList.remove('dragging');});
editor.addEventListener('drop',async e=>{
  e.preventDefault();editor.classList.remove('dragging');
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/'));
  for(const file of files){await uploadToCatbox(file);}
});
editor.addEventListener('paste',async e=>{
  const items=[...e.clipboardData.items].filter(i=>i.type.startsWith('image/'));
  if(!items.length)return;
  e.preventDefault();
  for(const item of items){const f=item.getAsFile();if(f)await uploadToCatbox(f);}
});

async function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        const MAX=2000;
        if(w>MAX||h>MAX){if(w>h){h*=MAX/w;w=MAX;}else{w*=MAX/h;h=MAX;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{resolve(new File([blob],file.name.replace(/\.\w+$/,'.jpg'),{type:'image/jpeg'}));},'image/jpeg',0.88);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToCatbox(file){
  try{
    showToast('⬆ 上傳中...');
    const isImg=file.type.startsWith('image/');
    const processed=isImg?await compressImage(file):file;
    const fd=new FormData();
    fd.append('reqtype','fileupload');
    fd.append('fileToUpload',processed);
    const res=await fetch(CATBOX_API,{method:'POST',body:fd});
    const url=(await res.text()).trim();
    if(!url.startsWith('https://'))throw new Error(url);
    const bbcode=isImg?`[ximg]${url}[/ximg]
`:`[xmp4]${url}[/xmp4]
`;
    insertAtCursor(bbcode);
    addToGallery(url,isImg?'img':'vid');
    updatePreview();
    showToast('✅ 上傳成功！');
  }catch(err){
    console.error(err);
    showToast('❌ 上傳失敗，請改用手動方式');
  }
}

function selectUploadFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*,video/mp4,video/mov,video/quicktime';
  input.multiple=true;
  input.onchange=async()=>{for(const f of [...input.files])await uploadToCatbox(f);};
  input.click();
}

   INIT
═══════════════════════════════════════════ */
buildLeftPanel();
// Restore last editor content from localStorage
try{
  const saved=localStorage.getItem('liujin_editor_content');
  if(saved){editor.value=saved;updatePreview();updateStats();}
}catch(e){}
pushUndo(editor.value||'');
